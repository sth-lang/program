<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관계조건 포함 학생 모둠 편성 프로그램</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
    .wrap { max-width: 1220px; margin: 0 auto; padding: 28px; }
    .hero, .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 8px 20px rgba(15, 23, 42, .06); }
    .hero { padding: 28px; display: flex; gap: 20px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    h1 { margin: 0; font-size: 32px; letter-spacing: -0.04em; }
    h2 { margin: 0 0 16px; font-size: 22px; }
    h3 { margin: 0; font-size: 22px; }
    p { margin: 8px 0 0; color: #475569; }
    .buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    button { border: 0; border-radius: 16px; padding: 12px 16px; font-weight: 700; cursor: pointer; background: #0f172a; color: white; }
    button.secondary { background: white; color: #0f172a; border: 1px solid #cbd5e1; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; margin-top: 18px; }
    .card { padding: 22px; }
    .checks { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    label.box { border: 1px solid #e2e8f0; border-radius: 18px; padding: 14px; display: flex; align-items: center; gap: 10px; }
    input[type="number"] { width: 100%; margin-top: 8px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 16px; }
    .stats { background: #f1f5f9; border-radius: 18px; padding: 16px; margin-bottom: 10px; }
    .warn { background: #fffbeb; color: #92400e; border-radius: 16px; padding: 12px; margin-top: 10px; font-size: 14px; }
    .ok { background: #ecfdf5; color: #065f46; border-radius: 16px; padding: 12px; margin-top: 10px; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border: 1px solid #cbd5e1; padding: 8px; text-align: center; }
    th { background: #f1f5f9; }
    .table-wrap { overflow-x: auto; }
    .results { margin-top: 18px; display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
    .group-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 24px; padding: 18px; box-shadow: 0 8px 20px rgba(15, 23, 42, .06); }
    .group-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .pill { background: #f1f5f9; border-radius: 999px; padding: 6px 10px; font-size: 13px; color: #334155; }
    .hidden { display: none; }
    .student-row { cursor: pointer; transition: .12s ease; }
    .student-row:hover { background: #f8fafc; }
    .student-row.selected { background: #dbeafe; outline: 2px solid #2563eb; outline-offset: -2px; }
    .star-btn { border: 1px solid #cbd5e1; background: white; color: #94a3b8; width: 34px; height: 34px; padding: 0; border-radius: 999px; font-size: 20px; line-height: 1; }
    .star-btn.active { color: #f59e0b; border-color: #f59e0b; background: #fffbeb; }
    .leader-label { display: inline-block; min-width: 34px; font-weight: 700; color: #92400e; }
    .guide { margin-top: 8px; font-size: 13px; color: #64748b; }
    .tag { display:inline-block; border-radius:999px; background:#eef2ff; color:#3730a3; padding:2px 7px; margin:2px; font-size:12px; }
    .tag.bad { background:#fee2e2; color:#991b1b; }
    @media (max-width: 900px) { .grid, .results { grid-template-columns: 1fr; } .checks { grid-template-columns: 1fr; } }
    @media print {
      .no-print { display: none !important; }
      body {
        background: white;
        color: black;
        font-size: 11pt;
      }
      .wrap {
        padding: 0;
        max-width: none;
      }
      .results {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .group-card {
        box-shadow: none !important;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        break-inside: avoid;
        page-break-inside: avoid;
        padding: 10px;
      }
      table {
        font-size: 10pt;
      }
      th, td {
        padding: 6px;
      }
      .score-col, .score-cell, .avg-pill {
        display: none !important;
      }
      .star-btn {
        display: none !important;
      }
      .guide {
        display: none !important;
      }
      .student-row {
        cursor: default;
      }
      h3 {
        font-size: 16pt;
        margin-bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero no-print">
      <div>
        <h1>학생 모둠 편성 프로그램</h1>
        <p>관계조건 포함 엑셀 명단을 올리면 같은 조 희망/피하기 조건까지 반영합니다.</p>
      </div>
      <div class="buttons">
        <button class="secondary" id="templateBtn">엑셀 양식 받기</button>
        <button id="uploadBtn">엑셀 업로드</button>
        <input class="hidden" id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
      </div>
    </section>

    <section class="grid no-print">
      <div class="card">
        <h2>편성 조건</h2>
        <div class="checks">
          <label class="box"><input type="checkbox" id="balanceGender" checked /> 남녀 비율 일정하게 하기</label>
          <label class="box"><input type="checkbox" id="balanceScore" checked /> 성적 고르게 배분하기</label>
          <label class="box"><input type="checkbox" id="assignLeaders" checked /> 조장 가능 학생 배치하기</label>
          <label class="box"><input type="checkbox" id="useRelations" checked /> 같은 조/피하기 조건 반영하기</label>
          <label class="box" style="display:block"><span>모둠의 개수</span><input type="number" id="groupCount" min="1" value="6" /></label>
        </div>
        <div class="buttons" style="margin-top:16px">
          <button id="groupBtn" disabled>모둠 짜기</button>
          <button class="secondary" id="printBtn" disabled>인쇄용 표 출력</button>
        </div>
        <p class="guide">같은 조 희망/피하기 칸에는 이름을 쉼표로 구분해서 적으면 됩니다. 예: 김민준, 이서연</p>
      </div>
      <div class="card">
        <h2>현재 정보</h2>
        <div class="stats">학생 수<br><b id="studentCount" style="font-size:28px">0명</b></div>
        <div class="stats">모둠당 인원<br><b id="memberRange">-</b></div>
        <div id="warnings"></div>
      </div>
    </section>

    <section class="card no-print hidden" id="studentSection" style="margin-top:18px">
      <h2>업로드된 학생 명단</h2>
      <div class="table-wrap"><table id="studentTable"></table></div>
    </section>

    <section class="card no-print hidden" id="relationReportSection" style="margin-top:18px">
      <h2>관계조건 반영 결과</h2>
      <div id="relationReport"></div>
    </section>

    <section id="resultSection" class="hidden" style="margin-top:22px">
      <div class="no-print" style="margin-bottom:12px">
        <h2>모둠 편성 결과</h2>
        <p>학생 두 명을 차례로 클릭하면 서로 자리가 바뀌고 평균 점수가 바로 다시 계산됩니다. 별표를 누르면 조장 표시가 켜지거나 꺼집니다.</p>
      </div>
      <div class="results" id="results"></div>
    </section>
  </div>

<script>
let students = [];
let groups = [];
let selectedSeat = null;
let relationMessages = [];

const $ = (id) => document.getElementById(id);
function escapeHtml(value) {
  return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
}
function parseNames(value) {
  return String(value ?? "")
    .split(/[,，、\/\n;；]+/)
    .map(v => v.trim())
    .filter(Boolean);
}
function getCell(row, names) {
  for (const name of names) if (row[name] !== undefined) return row[name];
  return "";
}
function normalizeStudent(row, index) {
  const name = getCell(row, ["이름", "name", "Name"]);
  const gender = getCell(row, ["성별", "gender", "Gender"]);
  const scoreRaw = getCell(row, ["점수", "score", "Score"]);
  const className = getCell(row, ["반", "class", "Class"]);
  const leaderRaw = getCell(row, ["조장 가능", "조장가능", "leader", "Leader"]);
  const mustWithRaw = getCell(row, ["같은 조 희망", "같은조희망", "같은 조", "같은조", "같이", "mustWith", "Must With"]);
  const avoidWithRaw = getCell(row, ["같은 조 피하기", "같은조피하기", "피하기", "분리", "avoidWith", "Avoid With"]);
  const memo = getCell(row, ["메모", "memo", "Memo"]);
  const leaderText = String(leaderRaw).trim().toLowerCase();
  const score = Number(scoreRaw);
  return {
    id: `${index}-${name}-${Math.random().toString(36).slice(2, 7)}`,
    name: String(name).trim(),
    gender: String(gender).trim(),
    score: Number.isFinite(score) ? score : 0,
    className: String(className).trim(),
    canLead: ["o", "yes", "y", "true", "가능", "1", "예", "네"].includes(leaderText),
    mustWithNames: parseNames(mustWithRaw),
    avoidWithNames: parseNames(avoidWithRaw),
    memo: String(memo ?? "").trim(),
    isLeader: false
  };
}
function makeTemplate() {
  const rows = [
    { 반: "1반", 이름: "김민준", 성별: "남", 점수: 92, "조장 가능": "O", "같은 조 희망": "", "같은 조 피하기": "", 메모: "" },
    { 반: "1반", 이름: "이서연", 성별: "여", 점수: 85, "조장 가능": "X", "같은 조 희망": "박도윤", "같은 조 피하기": "", 메모: "쉼표로 여러 명 입력 가능" },
    { 반: "1반", 이름: "박도윤", 성별: "남", 점수: 78, "조장 가능": "O", "같은 조 희망": "이서연", "같은 조 피하기": "최지우", 메모: "" },
    { 반: "1반", 이름: "최지우", 성별: "여", 점수: 88, "조장 가능": "X", "같은 조 희망": "", "같은 조 피하기": "박도윤", 메모: "" }
  ];
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [{ wch: 12 }, { wch: 16 }, { wch: 10 }, { wch: 10 }, { wch: 14 }, { wch: 20 }, { wch: 20 }, { wch: 28 }];
  const guide = XLSX.utils.aoa_to_sheet([
    ["입력 방법"],
    ["성별", "남 또는 여"],
    ["조장 가능", "O 또는 X"],
    ["같은 조 희망", "같은 조에 넣고 싶은 학생 이름을 쉼표로 구분해서 입력"],
    ["같은 조 피하기", "같은 조에 넣지 않을 학생 이름을 쉼표로 구분해서 입력"],
    ["예시", "김민준, 이서연"]
  ]);
  guide["!cols"] = [{ wch: 18 }, { wch: 60 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "학생명단");
  XLSX.utils.book_append_sheet(wb, guide, "입력방법");
  XLSX.writeFile(wb, "모둠편성_학생명단_관계조건포함.xlsx");
}
function updateStats() {
  const groupCount = Math.max(1, Number($("groupCount").value) || 1);
  $("studentCount").textContent = `${students.length}명`;
  if (!students.length) $("memberRange").textContent = "-";
  else {
    const n = Math.floor(students.length / groupCount);
    $("memberRange").textContent = `${n}~${students.length % groupCount === 0 ? n : n + 1}명`;
  }
  const warnings = [];
  if (students.length && $("assignLeaders").checked) {
    const leaders = students.filter(s => s.canLead).length;
    if (leaders < groupCount) warnings.push(`조장 가능 학생이 ${leaders}명이라 모든 모둠에 조장을 1명씩 배치하지 못할 수 있습니다.`);
  }
  if (students.length && groupCount > students.length) warnings.push("모둠 수가 학생 수보다 많습니다.");
  const unknownNames = getUnknownRelationNames();
  if (unknownNames.length) warnings.push(`관계조건에 명단에 없는 이름이 있습니다: ${unknownNames.join(", ")}`);
  $("warnings").innerHTML = warnings.map(w => `<div class="warn">${escapeHtml(w)}</div>`).join("");
}
function getUnknownRelationNames() {
  const known = new Set(students.map(s => s.name));
  const unknown = new Set();
  students.forEach(s => [...s.mustWithNames, ...s.avoidWithNames].forEach(n => { if (n && !known.has(n)) unknown.add(n); }));
  return [...unknown];
}
function renderStudentTable() {
  if (!students.length) return;
  $("studentSection").classList.remove("hidden");
  $("studentTable").innerHTML = `<thead><tr><th>반</th><th>이름</th><th>성별</th><th>점수</th><th>조장 가능</th><th>같은 조 희망</th><th>같은 조 피하기</th><th>메모</th></tr></thead><tbody>` +
    students.map(s => `<tr><td>${escapeHtml(s.className)}</td><td><b>${escapeHtml(s.name)}</b></td><td>${escapeHtml(s.gender)}</td><td>${s.score}</td><td>${s.canLead ? "O" : "X"}</td><td>${s.mustWithNames.map(n => `<span class="tag">${escapeHtml(n)}</span>`).join("")}</td><td>${s.avoidWithNames.map(n => `<span class="tag bad">${escapeHtml(n)}</span>`).join("")}</td><td>${escapeHtml(s.memo)}</td></tr>`).join("") + `</tbody>`;
}
function distributeBySnake(pool, groupCount) {
  const result = Array.from({ length: groupCount }, (_, i) => ({ id: i + 1, students: [] }));
  pool.forEach((student, idx) => {
    const cycle = Math.floor(idx / groupCount);
    const pos = idx % groupCount;
    const groupIndex = cycle % 2 === 0 ? pos : groupCount - 1 - pos;
    result[groupIndex].students.push(student);
  });
  return result;
}
function isMale(s) { return s.gender.includes("남") || s.gender.toLowerCase().startsWith("m"); }
function isFemale(s) { return s.gender.includes("여") || s.gender.toLowerCase().startsWith("f"); }
function rebalanceGender(gs) {
  const diff = (g) => g.students.filter(isMale).length - g.students.filter(isFemale).length;
  for (let pass = 0; pass < 80; pass++) {
    const highM = [...gs].sort((a,b) => diff(b) - diff(a))[0];
    const highF = [...gs].sort((a,b) => diff(a) - diff(b))[0];
    if (!highM || !highF || Math.abs(diff(highM) - diff(highF)) <= 1) break;
    const male = highM.students.find(isMale);
    const female = highF.students.find(isFemale);
    if (!male || !female) break;
    highM.students = highM.students.map(s => s.id === male.id ? female : s);
    highF.students = highF.students.map(s => s.id === female.id ? male : s);
  }
  return gs;
}
function ensureLeaders(gs) {
  gs.forEach(g => g.students.forEach(s => { s.isLeader = false; }));
  gs.filter(g => !g.students.some(s => s.canLead)).forEach(target => {
    const donor = gs.find(g => g.students.filter(s => s.canLead).length >= 2);
    if (!donor) return;
    const leader = donor.students.find(s => s.canLead);
    const swap = target.students.find(s => !s.canLead) ?? target.students[0];
    if (!leader || !swap) return;
    donor.students = donor.students.map(s => s.id === leader.id ? swap : s);
    target.students = target.students.map(s => s.id === swap.id ? leader : s);
  });
  gs.forEach(g => { const first = g.students.find(s => s.canLead); if (first) first.isLeader = true; });
  return gs;
}
function recalcAverages() {
  groups = groups.map(g => ({ ...g, avg: g.students.length ? Math.round((g.students.reduce((sum,s)=>sum + (Number(s.score) || 0),0) / g.students.length) * 10) / 10 : 0 }));
}
function findSeatByName(name) {
  for (let gi = 0; gi < groups.length; gi++) {
    const si = groups[gi].students.findIndex(s => s.name === name);
    if (si >= 0) return { groupIndex: gi, studentIndex: si };
  }
  return null;
}
function moveStudentToGroup(studentName, targetGroupIndex) {
  const seat = findSeatByName(studentName);
  if (!seat || seat.groupIndex === targetGroupIndex) return false;
  const target = groups[targetGroupIndex];
  const source = groups[seat.groupIndex];
  if (!target || !source) return false;
  let swapIndex = target.students.findIndex(s => !s.canLead && !s.mustWithNames.length && !s.avoidWithNames.length);
  if (swapIndex < 0) swapIndex = target.students.length - 1;
  const moving = source.students[seat.studentIndex];
  const swapped = target.students[swapIndex];
  source.students[seat.studentIndex] = swapped;
  target.students[swapIndex] = moving;
  return true;
}
function applyMustWith() {
  const known = new Set(students.map(s => s.name));
  for (let round = 0; round < 4; round++) {
    students.forEach(s => {
      const baseSeat = findSeatByName(s.name);
      if (!baseSeat) return;
      s.mustWithNames.forEach(name => {
        if (!known.has(name)) return;
        const otherSeat = findSeatByName(name);
        if (!otherSeat) return;
        if (otherSeat.groupIndex !== baseSeat.groupIndex) moveStudentToGroup(name, baseSeat.groupIndex);
      });
    });
  }
}
function applyAvoidWith() {
  const known = new Set(students.map(s => s.name));
  for (let round = 0; round < 6; round++) {
    let changed = false;
    students.forEach(s => {
      const baseSeat = findSeatByName(s.name);
      if (!baseSeat) return;
      s.avoidWithNames.forEach(name => {
        if (!known.has(name)) return;
        const otherSeat = findSeatByName(name);
        if (!otherSeat || otherSeat.groupIndex !== baseSeat.groupIndex) return;
        const candidates = groups.map((g, i) => i).filter(i => i !== baseSeat.groupIndex);
        for (const gi of candidates) {
          const conflictInCandidate = groups[gi].students.some(x => s.avoidWithNames.includes(x.name) || x.avoidWithNames.includes(s.name));
          if (!conflictInCandidate) {
            changed = moveStudentToGroup(name, gi) || changed;
            break;
          }
        }
      });
    });
    if (!changed) break;
  }
}
function evaluateRelations() {
  relationMessages = [];
  const known = new Set(students.map(s => s.name));
  students.forEach(s => {
    const baseSeat = findSeatByName(s.name);
    if (!baseSeat) return;
    s.mustWithNames.forEach(name => {
      if (!known.has(name)) return;
      const otherSeat = findSeatByName(name);
      const ok = otherSeat && otherSeat.groupIndex === baseSeat.groupIndex;
      relationMessages.push({ ok, text: `${s.name} ↔ ${name} 같은 조 희망 ${ok ? "반영" : "미반영"}` });
    });
    s.avoidWithNames.forEach(name => {
      if (!known.has(name)) return;
      const otherSeat = findSeatByName(name);
      const ok = otherSeat && otherSeat.groupIndex !== baseSeat.groupIndex;
      relationMessages.push({ ok, text: `${s.name} ↔ ${name} 같은 조 피하기 ${ok ? "반영" : "미반영"}` });
    });
  });
  renderRelationReport();
}
function renderRelationReport() {
  if (!relationMessages.length) {
    $("relationReportSection").classList.add("hidden");
    return;
  }
  $("relationReportSection").classList.remove("hidden");
  $("relationReport").innerHTML = relationMessages.map(m => `<div class="${m.ok ? "ok" : "warn"}">${escapeHtml(m.text)}</div>`).join("");
}
function createGroups() {
  const clean = students.filter(s => s.name).map(s => ({...s, isLeader: false}));
  const groupCount = Math.max(1, Math.min(Number($("groupCount").value) || 1, clean.length));
  let pool = [...clean];
  if ($("balanceScore").checked) pool.sort((a,b) => b.score - a.score);
  else pool.sort(() => Math.random() - 0.5);
  let gs = distributeBySnake(pool, groupCount);
  if ($("balanceGender").checked) gs = rebalanceGender(gs);
  groups = gs;
  if ($("useRelations").checked) {
    applyMustWith();
    applyAvoidWith();
  }
  if ($("assignLeaders").checked) groups = ensureLeaders(groups);
  recalcAverages();
  evaluateRelations();
  selectedSeat = null;
  renderGroups();
}
function renderGroups() {
  $("resultSection").classList.remove("hidden");
  $("printBtn").disabled = false;
  $("results").innerHTML = groups.map((g, groupIndex) => `
    <div class="group-card">
      <div class="group-head"><h3>${g.id}모둠</h3></div>
      <table><thead><tr><th>조장</th><th>이름</th><th>성별</th><th class="score-col">점수</th></tr></thead><tbody>
      ${g.students.map((s, studentIndex) => `<tr class="student-row ${selectedSeat && selectedSeat.groupIndex === groupIndex && selectedSeat.studentIndex === studentIndex ? "selected" : ""}" data-group="${groupIndex}" data-student="${studentIndex}">
        <td><button type="button" class="star-btn ${s.isLeader ? "active" : ""}" data-group="${groupIndex}" data-student="${studentIndex}" title="조장 표시">★</button><span class="leader-label">${s.isLeader ? "조장" : ""}</span></td>
        <td><b>${escapeHtml(s.name)}</b></td><td>${escapeHtml(s.gender)}</td><td class="score-cell">${s.score}</td>
      </tr>`).join("")}
      </tbody></table><div class="guide no-print">자리 바꾸기: 학생 2명 클릭 / 조장 지정: 별표 클릭</div>
    </div>`).join("");
  document.querySelectorAll(".student-row").forEach(row => row.addEventListener("click", handleStudentClick));
  document.querySelectorAll(".star-btn").forEach(btn => btn.addEventListener("click", handleStarClick));
}
function updateAverageDisplay(groupIndex) {
  const g = groups[groupIndex];
  if (!g) return;
  g.avg = g.students.length ? Math.round((g.students.reduce((sum,s)=>sum + (Number(s.score) || 0),0) / g.students.length) * 10) / 10 : 0;
  const el = $(`avg-${groupIndex}`);
  if (el) el.textContent = g.avg;
}
function handleStudentClick(e) {
  if (e.target.closest(".star-btn")) return;
  const row = e.currentTarget;
  const current = { groupIndex: Number(row.dataset.group), studentIndex: Number(row.dataset.student) };
  if (!selectedSeat) { selectedSeat = current; renderGroups(); return; }
  if (selectedSeat.groupIndex === current.groupIndex && selectedSeat.studentIndex === current.studentIndex) { selectedSeat = null; renderGroups(); return; }
  const a = groups[selectedSeat.groupIndex].students[selectedSeat.studentIndex];
  const b = groups[current.groupIndex].students[current.studentIndex];
  groups[selectedSeat.groupIndex].students[selectedSeat.studentIndex] = b;
  groups[current.groupIndex].students[current.studentIndex] = a;
  updateAverageDisplay(selectedSeat.groupIndex);
  updateAverageDisplay(current.groupIndex);
  selectedSeat = null;
  recalcAverages();
  evaluateRelations();
  renderGroups();
}
function handleStarClick(e) {
  e.stopPropagation();
  const groupIndex = Number(e.currentTarget.dataset.group);
  const studentIndex = Number(e.currentTarget.dataset.student);
  const student = groups[groupIndex]?.students?.[studentIndex];
  if (!student) return;
  student.isLeader = !student.isLeader;
  renderGroups();
}
$("templateBtn").addEventListener("click", makeTemplate);
$("uploadBtn").addEventListener("click", () => $("fileInput").click());
$("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet);
  students = rows.map(normalizeStudent).filter(s => s.name);
  groups = [];
  selectedSeat = null;
  relationMessages = [];
  $("groupBtn").disabled = students.length === 0;
  $("printBtn").disabled = true;
  $("resultSection").classList.add("hidden");
  $("relationReportSection").classList.add("hidden");
  updateStats();
  renderStudentTable();
});
$("groupBtn").addEventListener("click", createGroups);
$("printBtn").addEventListener("click", () => window.print());
["balanceGender", "balanceScore", "assignLeaders", "useRelations", "groupCount"].forEach(id => $(id).addEventListener("change", updateStats));
updateStats();
</script>
</body>
</html>
